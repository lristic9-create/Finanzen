// ── STORAGE ─────────────────────────────────────────────────────
async function loadFromStorage(key, fallback) {
try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}
async function saveToStorage(key, val) {
try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

// ── MINI BAR CHART ────────────────────────────────────────────
function BarChart({ data }) {
const max = Math.max(…data.map(d => Math.max(d.ein, d.aus)), 1);
return (
<div style={{overflowX:“auto”}}>
<div style={{display:“flex”,alignItems:“flex-end”,gap:“3px”,height:“110px”,minWidth:“360px”,padding:“0 4px”}}>
{data.map((d,i) => (
<div key={i} style={{flex:1,display:“flex”,flexDirection:“column”,alignItems:“center”,gap:“2px”}}>
<div style={{flex:1,width:“100%”,display:“flex”,alignItems:“flex-end”,gap:“2px”}}>
<div style={{flex:1,background:”#34C75988”,borderRadius:“3px 3px 0 0”,height:Math.max(2,Math.round((d.ein/max)*90))+”%”}}/>
<div style={{flex:1,background:”#FF3B3088”,borderRadius:“3px 3px 0 0”,height:Math.max(2,Math.round((d.aus/max)*90))+”%”}}/>
</div>
<div style={{fontSize:“9px”,color:”#8E8E93”}}>{d.l}</div>
</div>
))}
</div>
<div style={{display:“flex”,gap:“12px”,marginTop:“6px”,fontSize:“11px”,color:”#8E8E93”}}>
<span><span style={{color:”#34C759”}}>■</span> Einnahmen</span>
<span><span style={{color:”#FF3B30”}}>■</span> Ausgaben</span>
</div>
</div>
);
}

// ── MODAL ─────────────────────────────────────────────────────
function Modal({ open, onClose, title, children }) {
if (!open) return null;
return (
<div onClick={e => e.target === e.currentTarget && onClose()} style={{position:“fixed”,inset:0,background:“rgba(0,0,0,.5)”,zIndex:200,display:“flex”,alignItems:“flex-end”,justifyContent:“center”}}>

<div style={{padding:“14px 20px 12px”,background:”#F2F2F7”,position:“sticky”,top:0,zIndex:1,display:“flex”,justifyContent:“space-between”,alignItems:“center”}}>
<div style={{fontSize:“19px”,fontWeight:700,color:”#1C1C1E”}}>{title}</div>
<button onClick={onClose} style={{background:”#E5E5EA”,border:“none”,borderRadius:“50%”,width:“30px”,height:“30px”,cursor:“pointer”,fontSize:“16px”}}>✕</button>
</div>
<div style={{padding:“0 16px 40px”,display:“flex”,flexDirection:“column”,gap:“12px”}}>
{children}
</div>
</div>
</div>
);
}

return m;

function saveEntry() {
if (!form.desc||!form.amt||isNaN(parseFloat(form.amt))) return;
const cat = form.cat===”**custom**” ? form.customCat.trim() : form.cat;
if (!cat) return;
if (form.cat===”**custom**”&&cat) { if(form.type===“income”) setIncCats(p=>p.includes(cat)?p:[…p,cat]); else setExpCats(p=>p.includes(cat)?p:[…p,cat]); }
const entry = {…form, cat, amt:parseFloat(form.amt)};
if (editId) setEntries(p=>p.map(e=>e.id===editId?{…entry,id:editId}:e));
else setEntries(p=>[…p,{…entry,id:Date.now()}]);

async function analyzeFile(file) {
if (!file.type.startsWith(“image/”)&&file.type!==“application/pdf”) { setUpRes({error:“Nur JPG/PNG/PDF”}); return; }
setUpLoad(true); setUpRes(null);
const b64 = await new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result.split(”,”)[1]);r.readAsDataURL(file);});
const cItem = file.type.startsWith(“image/”) ? {type:“image”,source:{type:“base64”,media_type:file.type,data:b64}} : {type:“document”,source:{type:“base64”,media_type:“application/pdf”,data:b64}};
const prompt = “Analysiere dieses Dokument. Antworte nur mit reinem JSON ohne Backticks:\n{"date":"YYYY-MM-DD","description":"max 60 Zeichen","vendor":"Aussteller","clientName":"","amount":0,"suggestedCategory":"","invoiceNumber":"","type":"expense","confidence":0}\nBekannte Kunden: “+clients.map(c=>c.name).join(”, “)+”\nKategorien: “+[…INC_CATS,…EXP_CATS].join(”, “)+”\nHeute: “+TODAY_S;
try {
const resp=await fetch(“https://api.anthropic.com/v1/messages”,{method:“POST”,headers:{“Content-Type”:“application/json”},body:JSON.stringify({model:“claude-sonnet-4-20250514”,max_tokens:400,messages:[{role:“user”,content:[cItem,{type:“text”,text:prompt}]}]})});
const data=await resp.json();
let text=(data.content||[]).map(c=>c.text||””).join(””).trim();
const m=text.match(/{[\s\S]*}/); if(m) text=m[0];
setUpRes(JSON.parse(text));
} catch { setUpRes({error:“Analyse fehlgeschlagen.”}); }
setUpLoad(false);
}

              <div style={{fontSize:"12px",fontWeight:700,color:EV_S[ev.status]?.c||"#007AFF"}}>{new Date(ev.date).getDate()}</div>
              <div style={{fontSize:"9px",color:EV_S[ev.status]?.c||"#007AFF"}}>{MONTHS_S[new Date(ev.date).getMonth()]}</div>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:"14px",fontWeight:500,color:"#1C1C1E",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ev.title}</div>
              <div style={{fontSize:"12px",color:"#8E8E93"}}>{ev.client}{ev.loc?" - "+ev.loc:""}</div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              {ev.income>0&&<div style={{fontSize:"13px",fontWeight:600,color:"#34C759"}}>+{fmt(ev.income)}</div>}
              {ev.costs>0&&<div style={{fontSize:"12px",color:"#FF3B30"}}>-{fmt(ev.costs)}</div>}
              <div style={{fontSize:"11px",color:"#8E8E93"}}>{EFFORT[ev.effort]||""}</div>
            </div>
          </Row>
        ))}
      </div>
    </>}

    {/* PROGNOSE */}
    {tab==="fore" && <>
      <div style={{marginTop:"14px",background:"linear-gradient(135deg,#007AFF,#5856D6)",borderRadius:"20px",padding:"20px",marginBottom:"10px"}}>
        <div style={{fontSize:"13px",color:"rgba(255,255,255,.75)",marginBottom:"4px"}}>Jahr {fYear}</div>
        <div style={{fontSize:"26px",fontWeight:700,color:"#fff"}}>{fmt(yInc)}</div>
        <div style={{fontSize:"14px",color:"rgba(255,255,255,.8)",marginTop:"6px"}}>Ausgaben: {fmt(yExp)} | Gewinn: {fmt(yInc-yExp)}</div>
      </div>
      {MONTHS.map((m,i)=>{
        const me=yearEnt.filter(e=>new Date(e.date).getMonth()===i);
        const inc=sum(me.filter(e=>e.type==="income"),e=>e.amt), exp=sum(me.filter(e=>e.type==="expense"),e=>e.amt);
        if(!inc&&!exp) return null;
        const gew=inc-exp;
        return (
          <div key={m} style={{background:"#fff",borderRadius:"14px",padding:"14px",marginBottom:"8px"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:"6px"}}>
              <div style={{fontSize:"15px",fontWeight:600,color:"#1C1C1E"}}>{m}</div>
              <div style={{fontSize:"16px",fontWeight:700,color:gew>=0?"#007AFF":"#FF3B30"}}>{fmt(gew)}</div>
            </div>
            <div style={{display:"flex",gap:"16px",alignItems:"center"}}>
              <div><div style={{fontSize:"11px",color:"#8E8E93"}}>Einnahmen</div><div style={{fontSize:"13px",fontWeight:600,color:"#34C759"}}>{fmt(inc)}</div></div>
              <div><div style={{fontSize:"11px",color:"#8E8E93"}}>Ausgaben</div><div style={{fontSize:"13px",fontWeight:600,color:"#FF3B30"}}>{fmt(exp)}</div></div>
              <div style={{flex:1}}><div style={{height:"5px",background:"#F2F2F7",borderRadius:"3px",overflow:"hidden"}}><div style={{height:"100%",width:Math.min(100,(inc/(inc+exp||1))*100)+"%",background:"#34C759",borderRadius:"3px"}}/></div></div>
            </div>
          </div>
        );
      })}
    </>}

    {/* KUNDEN */}
    {tab==="clients" && <>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:"14px",marginBottom:"10px"}}>
        <div style={{fontSize:"16px",fontWeight:700,color:"#1C1C1E"}}>Kundendatenbank</div>
        <Btn onClick={()=>{setEditId(null);setClForm(ECL);setShowCl(true);}} style={{fontSize:"13px",padding:"8px 16px"}}>+ Neu</Btn>
      </div>
      <div style={{background:"#fff",borderRadius:"16px",overflow:"hidden"}}>
        {clientStats.length===0&&<div style={{padding:"28px",textAlign:"center",color:"#C7C7CC"}}>Noch keine Kunden</div>}
        {clientStats.map(cl=>(
          <Row key={cl.id} onClick={()=>{setEditId(cl.id);setClForm({name:cl.name,email:cl.email,phone:cl.phone,cat:cl.cat,city:cl.city,notes:cl.notes});setShowCl(true);}}>
            <div style={{width:"40px",height:"40px",borderRadius:"12px",background:"#F0F7FF",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <div style={{fontSize:"16px",fontWeight:700,color:"#007AFF"}}>{(cl.name||"?")[0].toUpperCase()}</div>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:"14px",fontWeight:500,color:"#1C1C1E"}}>{cl.name}</div>
              <div style={{fontSize:"12px",color:"#8E8E93"}}>{cl.cat}{cl.city?" - "+cl.city:""}</div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{fontSize:"14px",fontWeight:600,color:"#34C759"}}>{fmt(cl.revenue)}</div>
              <div style={{fontSize:"11px",color:"#8E8E93"}}>{cl.bookings} Buchung{cl.bookings!==1?"en":""}</div>
            </div>
          </Row>
        ))}
      </div>
    </>}

    {/* FAHRTEN */}
    {tab==="miles" && <>
      <div style={{marginTop:"14px",background:"linear-gradient(135deg,#FF9500,#FF6B35)",borderRadius:"20px",padding:"20px",marginBottom:"10px"}}>
        <div style={{fontSize:"13px",color:"rgba(255,255,255,.75)",marginBottom:"4px"}}>Fahrten {fYear}</div>
        <div style={{fontSize:"26px",fontWeight:700,color:"#fff"}}>{totalKm} km</div>
        <div style={{fontSize:"14px",color:"rgba(255,255,255,.8)",marginTop:"6px"}}>Kosten: {fmt(totalCost)} - steuerlich absetzbar</div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
        <div style={{fontSize:"16px",fontWeight:700,color:"#1C1C1E"}}>Alle Fahrten</div>
        <Btn onClick={()=>{setEditId(null);setTrForm(ETR);setShowTr(true);}} style={{fontSize:"13px",padding:"8px 16px"}}>+ Fahrt</Btn>
      </div>
      <div style={{background:"#fff",borderRadius:"16px",overflow:"hidden"}}>
        {trips.length===0&&<div style={{padding:"24px",textAlign:"center",color:"#C7C7CC"}}>Keine Fahrten</div>}
        {[...trips].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(t=>{
          const km=t.roundTrip?t.km*2:t.km;
          return (
            <Row key={t.id} onClick={()=>{setEditId(t.id);setTrForm({...t,km:String(t.km)});setShowTr(true);}}>
              <div style={{width:"38px",height:"38px",borderRadius:"10px",background:"#FFF8F0",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:"18px"}}>🚗</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:"14px",fontWeight:500,color:"#1C1C1E"}}>{t.from} - {t.to}</div>
                <div style={{fontSize:"12px",color:"#8E8E93"}}>{t.purpose} - {fmtD(t.date)}{t.roundTrip?" (H+R)":""}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:"13px",fontWeight:600,color:"#FF9500"}}>{km} km</div>
                <div style={{fontSize:"12px",color:"#FF3B30"}}>{fmt(km*t.cpk)}</div>
              </div>
            </Row>
          );
        })}
      </div>
    </>}

    {/* STEUER */}
    {tab==="tax" && <>
      <div style={{marginTop:"14px",background:"linear-gradient(135deg,#007AFF,#34AADC)",borderRadius:"20px",padding:"20px",marginBottom:"10px"}}>
        <div style={{fontSize:"13px",color:"rgba(255,255,255,.75)",marginBottom:"4px"}}>Steuerrel. Einnahmen {fYear}</div>
        <div style={{fontSize:"26px",fontWeight:700,color:"#fff"}}>{fmt(taxBase)}</div>
        <div style={{fontSize:"14px",color:"rgba(255,255,255,.8)",marginTop:"6px"}}>Gesch. MwSt (19%): {fmt(taxBase*0.19)}</div>
      </div>
      <div style={{background:"#fff",borderRadius:"16px",overflow:"hidden",marginBottom:"10px"}}>
        <SRow><span style={{fontSize:"14px",color:"#3A3A3C"}}>Betriebseinnahmen</span><span style={{fontSize:"14px",fontWeight:600,color:"#34C759"}}>+{fmt(yInc)}</span></SRow>
        <SRow><span style={{fontSize:"14px",color:"#3A3A3C"}}>Betriebsausgaben</span><span style={{fontSize:"14px",fontWeight:600,color:"#FF3B30"}}>-{fmt(yExp)}</span></SRow>
        <SRow><span style={{fontSize:"14px",color:"#3A3A3C"}}>Fahrtkosten absetzbar</span><span style={{fontSize:"14px",fontWeight:600,color:"#FF9500"}}>-{fmt(totalCost)}</span></SRow>
        <SRow style={{borderTop:"2px solid #E5E5EA"}}><span style={{fontSize:"16px",fontWeight:700,color:"#1C1C1E"}}>Gewinn / Verlust</span><span style={{fontSize:"16px",fontWeight:700,color:yInc-yExp>=0?"#007AFF":"#FF3B30"}}>{fmt(yInc-yExp)}</span></SRow>
      </div>
      <div style={{background:"#fff",borderRadius:"16px",overflow:"hidden",marginBottom:"12px"}}>
        <div style={{padding:"12px 18px 6px",fontSize:"14px",fontWeight:600,color:"#1C1C1E"}}>Ausgaben nach Kategorie</div>
        {expByCat.map((c,i)=>(
          <SRow key={c.n}>
            <div style={{display:"flex",alignItems:"center",gap:"8px"}}><div style={{width:"10px",height:"10px",borderRadius:"50%",background:COLORS[i%COLORS.length]}}/><span style={{fontSize:"13px",color:"#3A3A3C"}}>{c.n}</span></div>
            <span style={{fontSize:"13px",fontWeight:500,color:"#FF3B30"}}>{fmt(c.v)}</span>
          </SRow>
        ))}
      </div>
      <div style={{display:"flex",gap:"10px"}}>
        <Btn onClick={exportCSV} style={{flex:1}}>CSV Export</Btn>
        <BtnS onClick={exportBak}>Backup</BtnS>
      </div>
    </>}

    {/* KI CHAT */}
    {tab==="ai" && (
      <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 180px)"}}>
        <div style={{background:"#fff",borderRadius:"16px",padding:"12px 16px",marginTop:"14px",marginBottom:"10px"}}>
          <div style={{fontSize:"13px",fontWeight:600,color:"#1C1C1E"}}>KI-Finanzassistent</div>
          <div style={{fontSize:"12px",color:"#8E8E93",marginTop:"2px"}}>Ich kenne deine Buchungen, Termine, Kunden und Fahrten.</div>
        </div>
        <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:"10px",paddingBottom:"10px"}}>
          {aiMsgs.map((m,i)=>(
            <div key={i} style={{background:m.role==="user"?"#007AFF":"#fff",color:m.role==="user"?"#fff":"#1C1C1E",borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",padding:"10px 14px",fontSize:"14px",maxWidth:"80%",alignSelf:m.role==="user"?"flex-end":"flex-start",lineHeight:1.5,whiteSpace:"pre-wrap",boxShadow:m.role==="ai"?"0 1px 4px rgba(0,0,0,.1)":"none"}}>
              {m.content}
            </div>
          ))}
          {aiThink&&<div style={{background:"#fff",borderRadius:"18px 18px 18px 4px",padding:"10px 14px",fontSize:"14px",maxWidth:"80%",alignSelf:"flex-start",color:"#8E8E93",boxShadow:"0 1px 4px rgba(0,0,0,.1)"}}>Analysiere...</div>}
          <div ref={chatEnd}/>
        </div>
        <div style={{display:"flex",gap:"8px",paddingTop:"8px",paddingBottom:"8px"}}>
          <Inp value={aiInput} onChange={e=>setAiInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&sendAI()} placeholder="Frag deinen Assistenten..." style={{flex:1}}/>
          <Btn onClick={sendAI} style={{padding:"11px 16px",opacity:aiThink?0.5:1}}>▶</Btn>
        </div>
        <div style={{display:"flex",gap:"6px",flexWrap:"wrap",paddingBottom:"4px"}}>
          {["Groesste Ausgaben?","Was bleibt diesen Monat?","Top Kunden?","Fahrtkosten?"].map(p=>(
            <button key={p} onClick={()=>setAiInput(p)} style={{background:"#fff",border:"1px solid #E5E5EA",borderRadius:"20px",padding:"6px 12px",fontSize:"12px",color:"#007AFF",cursor:"pointer",fontFamily:"inherit"}}>{p}</button>
          ))}
        </div>
      </div>
    )}
  </div>

  {/* FAB */}
  <button onClick={()=>{if(tab==="cal")openNewEv();else if(tab==="clients"){setEditId(null);setClForm(ECL);setShowCl(true);}else if(tab==="miles"){setEditId(null);setTrForm(ETR);setShowTr(true);}else openAdd();}}
    style={{position:"fixed",bottom:"28px",right:"22px",width:"54px",height:"54px",borderRadius:"50%",background:"#007AFF",border:"none",color:"#fff",fontSize:"28px",cursor:"pointer",boxShadow:"0 4px 20px rgba(0,122,255,.4)",zIndex:50,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>

  {/* ENTRY MODAL */}
  <Modal open={showF} onClose={()=>setShowF(false)} title={editId?"Bearbeiten":"Neuer Eintrag"}>
    <Sec>
      <Item><Seg options={[{v:"income",l:"+ Einnahme"},{v:"expense",l:"- Ausgabe"}]} value={form.type} onChange={v=>setForm(f=>({...f,type:v,cat:v==="income"?incCats[0]:expCats[0]}))} /></Item>
      <Item label="Datum"><Inp type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></Item>
      <Item label="Kategorie">
        <Sel value={form.cat} options={[...curCats.map(c=>({v:c,l:c})),{v:"__custom__",l:"+ Neue Kategorie..."}]} onChange={e=>setForm(f=>({...f,cat:e.target.value}))}/>
        {form.cat==="__custom__"&&<Inp value={form.customCat} onChange={e=>setForm(f=>({...f,customCat:e.target.value}))} placeholder="Neue Kategorie..." style={{marginTop:"8px"}}/>}
      </Item>
      <Item label="Beschreibung"><Inp value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))} placeholder="Wie wurde die Einnahme generiert?"/></Item>
      {form.type==="income"&&<Item label="Kunde">
        <Sel value={form.client||""} options={[{v:"",l:"Manuell eingeben"},...clients.map(c=>({v:c.name,l:c.name}))]} onChange={e=>setForm(f=>({...f,client:e.target.value}))}/>
        {!clients.find(c=>c.name===form.client)&&<Inp value={form.client||""} onChange={e=>setForm(f=>({...f,client:e.target.value}))} placeholder="Kundenname..." style={{marginTop:"8px"}}/>}
      </Item>}
    </Sec>
    <Sec>
      <Item label="Betrag (Euro)"><Inp type="number" value={form.amt} onChange={e=>setForm(f=>({...f,amt:e.target.value}))} placeholder="0,00"/></Item>
      {form.type==="income"&&<Item label="Rechnungsnummer"><Inp value={form.inv} onChange={e=>setForm(f=>({...f,inv:e.target.value}))} placeholder="RE-2026-XXX"/></Item>}
    </Sec>
    {form.type==="income"&&<Sec><Item label="Zahlungsstatus">
      <div style={{display:"flex",gap:"6px",marginTop:"4px"}}>
        {Object.entries(PAY_S).map(([k,v])=>(
          <button key={k} onClick={()=>setForm(f=>({...f,status:k}))} style={{flex:1,padding:"8px",border:"2px solid "+(form.status===k?v.c:"#E5E5EA"),borderRadius:"10px",background:form.status===k?v.bg:"#F2F2F7",color:form.status===k?v.c:"#8E8E93",cursor:"pointer",fontFamily:"inherit",fontSize:"12px",fontWeight:500}}>{v.l}</button>
        ))}
      </div>
    </Item></Sec>}
    <Sec>
      <Item label="Notiz"><Inp value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="optional"/></Item>
      <Item>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div><div style={{fontSize:"15px",fontWeight:500,color:"#1C1C1E"}}>Steuerrelevant</div><div style={{fontSize:"12px",color:"#8E8E93"}}>Fuer EUeR</div></div>
          <Sw checked={form.tax} onChange={e=>setForm(f=>({...f,tax:e.target.checked}))}/>
        </div>
      </Item>
    </Sec>
    <div style={{display:"flex",gap:"10px"}}>
      <BtnS onClick={()=>setShowF(false)} style={{flex:1}}>Abbrechen</BtnS>
      <Btn onClick={saveEntry} style={{flex:2}}>{editId?"Speichern":"Hinzufuegen"}</Btn>
    </div>
  </Modal>

  {/* EVENT MODAL */}
  <Modal open={showEv} onClose={()=>setShowEv(false)} title={editId?"Termin bearbeiten":"Neuer Termin"}>
    <Sec><Item label="Status">
      <div style={{display:"flex",gap:"6px",marginTop:"4px"}}>
        {Object.entries(EV_S).map(([k,v])=>(
          <button key={k} onClick={()=>setEvForm(f=>({...f,status:k}))} style={{flex:1,padding:"8px 4px",border:"2px solid "+(evForm.status===k?v.c:"#E5E5EA"),borderRadius:"10px",background:evForm.status===k?v.bg:"#F2F2F7",color:evForm.status===k?v.c:"#8E8E93",cursor:"pointer",fontFamily:"inherit",fontSize:"12px",fontWeight:600}}>{v.l}</button>
        ))}
      </div>
    </Item></Sec>
    <Sec>
      <Item label="Titel"><Inp value={evForm.title} onChange={e=>setEvForm(f=>({...f,title:e.target.value}))} placeholder="z.B. DJ Set Club Berghain"/></Item>
      <Item label="Kunde"><Inp value={evForm.client} onChange={e=>setEvForm(f=>({...f,client:e.target.value}))} placeholder="Kundenname"/></Item>
      <Item label="Ort"><Inp value={evForm.loc} onChange={e=>setEvForm(f=>({...f,loc:e.target.value}))} placeholder="Stadt"/></Item>
    </Sec>
    <Sec><Item>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
        <div><div style={{fontSize:"12px",color:"#8E8E93",marginBottom:"5px"}}>Datum</div><Inp type="date" value={evForm.date} onChange={e=>setEvForm(f=>({...f,date:e.target.value}))}/></div>
        <div><div style={{fontSize:"12px",color:"#8E8E93",marginBottom:"5px"}}>Bis</div><Inp type="date" value={evForm.end} onChange={e=>setEvForm(f=>({...f,end:e.target.value}))}/></div>
      </div>
    </Item></Sec>
    <Sec>
      <div style={{padding:"12px 16px 6px",fontSize:"13px",fontWeight:600,color:"#1C1C1E"}}>Finanzen</div>
      <Item>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
          <div><div style={{fontSize:"12px",color:"#8E8E93",marginBottom:"5px"}}>Einnahme (Euro)</div><Inp type="number" value={evForm.income} onChange={e=>setEvForm(f=>({...f,income:e.target.value}))} placeholder="0,00"/></div>
          <div><div style={{fontSize:"12px",color:"#8E8E93",marginBottom:"5px"}}>Kosten (Euro)</div><Inp type="number" value={evForm.costs} onChange={e=>setEvForm(f=>({...f,costs:e.target.value}))} placeholder="0,00"/></div>
        </div>
        {parseFloat(evForm.income)>0&&<div style={{fontSize:"13px",color:"#34C759",fontWeight:600,marginTop:"8px"}}>Netto: {fmt((parseFloat(evForm.income)||0)-(parseFloat(evForm.costs)||0))}</div>}
      </Item>
    </Sec>
    <Sec><Item label="Aufwand"><Seg options={[{v:"low",l:"Gering"},{v:"medium",l:"Mittel"},{v:"high",l:"Hoch"}]} value={evForm.effort} onChange={v=>setEvForm(f=>({...f,effort:v}))}/></Item></Sec>
    <Sec><Item label="Notizen"><textarea value={evForm.notes} onInput={e=>setEvForm(f=>({...f,notes:e.target.value}))} placeholder="Equipment, Ablauf..." style={{background:"#F2F2F7",border:"none",borderRadius:"10px",padding:"11px 14px",color:"#1C1C1E",fontSize:"15px",outline:"none",width:"100%",resize:"vertical",minHeight:"70px",lineHeight:1.5,fontFamily:"inherit"}}/></Item></Sec>
    <Sec>
      <div style={{padding:"12px 16px 4px",fontSize:"13px",fontWeight:600,color:"#1C1C1E"}}>To-Dos</div>
      <div style={{padding:"0 16px"}}>
        {evForm.todos.map((t,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:"8px",padding:"8px 0",borderBottom:"1px solid #F2F2F7"}}>
            <input type="checkbox" checked={t.done} onChange={()=>setEvForm(f=>({...f,todos:f.todos.map((x,j)=>j===i?{...x,done:!x.done}:x)}))} style={{accentColor:"#007AFF",width:"17px",height:"17px",flexShrink:0}}/>
            <span style={{flex:1,fontSize:"14px",textDecoration:t.done?"line-through":"none",color:t.done?"#8E8E93":"#3A3A3C"}}>{t.text}</span>
            <button onClick={()=>setEvForm(f=>({...f,todos:f.todos.filter((_,j)=>j!==i)}))} style={{background:"none",border:"none",cursor:"pointer",color:"#C7C7CC",fontSize:"16px"}}>✕</button>
          </div>
        ))}
        <div style={{display:"flex",gap:"8px",padding:"10px 0 14px"}}>
          <Inp value={newTodo} onChange={e=>setNewTodo(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(()=>{if(newTodo.trim()){setEvForm(f=>({...f,todos:[...f.todos,{text:newTodo.trim(),done:false}]}));setNewTodo("");}})() } placeholder="To-Do..." style={{fontSize:"14px"}}/>
          <BtnS onClick={()=>{if(newTodo.trim()){setEvForm(f=>({...f,todos:[...f.todos,{text:newTodo.trim(),done:false}]}));setNewTodo("");}}} style={{whiteSpace:"nowrap"}}>+ Add</BtnS>
        </div>
      </div>
    </Sec>
    <div style={{display:"flex",gap:"10px"}}>
      {editId&&<BtnD onClick={()=>delEv(editId)}>Loeschen</BtnD>}
      <BtnS onClick={()=>setShowEv(false)} style={{flex:1}}>Abbrechen</BtnS>
      <Btn onClick={saveEv} style={{flex:2}}>{editId?"Speichern":"Hinzufuegen"}</Btn>
    </div>
  </Modal>

  {/* CLIENT MODAL */}
  <Modal open={showCl} onClose={()=>setShowCl(false)} title={editId?"Kunde bearbeiten":"Neuer Kunde"}>
    <Sec>
      <Item label="Name / Firma"><Inp value={clForm.name} onChange={e=>setClForm(f=>({...f,name:e.target.value}))} placeholder="z.B. Club XY GmbH"/></Item>
      <Item label="Kategorie"><Inp value={clForm.cat} onChange={e=>setClForm(f=>({...f,cat:e.target.value}))} placeholder="Club, Agentur, Privat..."/></Item>
      <Item label="Stadt"><Inp value={clForm.city} onChange={e=>setClForm(f=>({...f,city:e.target.value}))} placeholder="Berlin"/></Item>
      <Item label="E-Mail"><Inp type="email" value={clForm.email} onChange={e=>setClForm(f=>({...f,email:e.target.value}))} placeholder="email@..."/></Item>
      <Item label="Telefon"><Inp type="tel" value={clForm.phone} onChange={e=>setClForm(f=>({...f,phone:e.target.value}))} placeholder="+49..."/></Item>
      <Item label="Notizen"><textarea value={clForm.notes} onInput={e=>setClForm(f=>({...f,notes:e.target.value}))} placeholder="Hinweise..." style={{background:"#F2F2F7",border:"none",borderRadius:"10px",padding:"11px 14px",color:"#1C1C1E",fontSize:"15px",outline:"none",width:"100%",resize:"vertical",minHeight:"70px",lineHeight:1.5,fontFamily:"inherit"}}/></Item>
    </Sec>
    <div style={{display:"flex",gap:"10px"}}>
      {editId&&<BtnD onClick={()=>delCl(editId)}>Loeschen</BtnD>}
      <BtnS onClick={()=>setShowCl(false)} style={{flex:1}}>Abbrechen</BtnS>
      <Btn onClick={saveCl} style={{flex:2}}>Speichern</Btn>
    </div>
  </Modal>

  {/* TRIP MODAL */}
  <Modal open={showTr} onClose={()=>setShowTr(false)} title={editId?"Fahrt bearbeiten":"Neue Fahrt"}>
    <Sec>
      <Item label="Datum"><Inp type="date" value={trForm.date} onChange={e=>setTrForm(f=>({...f,date:e.target.value}))}/></Item>
      <Item>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
          <div><div style={{fontSize:"12px",color:"#8E8E93",marginBottom:"5px"}}>Von</div><Inp value={trForm.from} onChange={e=>setTrForm(f=>({...f,from:e.target.value}))} placeholder="Hamburg"/></div>
          <div><div style={{fontSize:"12px",color:"#8E8E93",marginBottom:"5px"}}>Nach</div><Inp value={trForm.to} onChange={e=>setTrForm(f=>({...f,to:e.target.value}))} placeholder="Berlin"/></div>
        </div>
      </Item>
      <Item>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
          <div><div style={{fontSize:"12px",color:"#8E8E93",marginBottom:"5px"}}>Kilometer (einfach)</div><Inp type="number" value={trForm.km} onChange={e=>setTrForm(f=>({...f,km:e.target.value}))} placeholder="288"/></div>
          <div><div style={{fontSize:"12px",color:"#8E8E93",marginBottom:"5px"}}>Euro/km</div><Inp type="number" value={trForm.cpk} onChange={e=>setTrForm(f=>({...f,cpk:parseFloat(e.target.value)||0.30}))} placeholder="0.30"/></div>
        </div>
      </Item>
      <Item label="Zweck"><Inp value={trForm.purpose} onChange={e=>setTrForm(f=>({...f,purpose:e.target.value}))} placeholder="z.B. DJ Auftritt"/></Item>
      <Item>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div><div style={{fontSize:"15px",fontWeight:500,color:"#1C1C1E"}}>Hin und Zurueck</div><div style={{fontSize:"12px",color:"#8E8E93"}}>km wird verdoppelt</div></div>
          <Sw checked={trForm.roundTrip} onChange={e=>setTrForm(f=>({...f,roundTrip:e.target.checked}))}/>
        </div>
      </Item>
      {trForm.km&&<Item><div style={{fontSize:"13px",color:"#FF9500",fontWeight:600}}>Gesamt: {trForm.roundTrip?parseFloat(trForm.km)*2:parseFloat(trForm.km)||0} km = {fmt((trForm.roundTrip?parseFloat(trForm.km)*2:parseFloat(trForm.km)||0)*trForm.cpk)}</div></Item>}
    </Sec>
    <div style={{display:"flex",gap:"10px"}}>
      {editId&&<BtnD onClick={()=>delTr(editId)}>Loeschen</BtnD>}
      <BtnS onClick={()=>setShowTr(false)} style={{flex:1}}>Abbrechen</BtnS>
      <Btn onClick={saveTr} style={{flex:2}}>Speichern</Btn>
    </div>
  </Modal>

  {/* RECUR MODAL */}
  <Modal open={showRec} onClose={()=>setShowRec(false)} title="Fixkost / Abo">
    <Sec>
      <Item label="Beschreibung"><Inp value={rForm.desc} onChange={e=>setRForm(f=>({...f,desc:e.target.value}))} placeholder="z.B. Adobe CC"/></Item>
      <Item label="Kategorie"><Sel value={rForm.cat} options={expCats.map(c=>({v:c,l:c}))} onChange={e=>setRForm(f=>({...f,cat:e.target.value}))}/></Item>
      <Item>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
          <div><div style={{fontSize:"12px",color:"#8E8E93",marginBottom:"5px"}}>Betrag (Euro)</div><Inp type="number" value={rForm.amt} onChange={e=>setRForm(f=>({...f,amt:e.target.value}))} placeholder="0,00"/></div>
          <div><div style={{fontSize:"12px",color:"#8E8E93",marginBottom:"5px"}}>Haeufigkeit</div><Sel value={rForm.freq} options={Object.entries(FREQ).map(([k,v])=>({v:k,l:v}))} onChange={e=>setRForm(f=>({...f,freq:e.target.value}))}/></div>
        </div>
      </Item>
      <Item label="Naechste Faelligkeit"><Inp type="date" value={rForm.next} onChange={e=>setRForm(f=>({...f,next:e.target.value}))}/></Item>
    </Sec>
    <div style={{display:"flex",gap:"10px"}}>
      <BtnS onClick={()=>setShowRec(false)} style={{flex:1}}>Abbrechen</BtnS>
      <Btn onClick={()=>{if(!rForm.desc||!rForm.amt)return;const r={...rForm,amt:parseFloat(rForm.amt),id:editId||Date.now()};if(editId)setRecur(p=>p.map(x=>x.id===editId?r:x));else setRecur(p=>[...p,r]);setShowRec(false);}} style={{flex:2}}>Speichern</Btn>
    </div>
  </Modal>

  {/* UPLOAD MODAL */}
  <Modal open={showUp} onClose={()=>{setShowUp(false);setUpRes(null);}} title="Beleg analysieren">
    <div style={{fontSize:"13px",color:"#8E8E93",marginBottom:"8px"}}>KI erkennt Betrag, Datum und Kategorie automatisch.</div>
    {!upRes&&!upLoad&&(
      <div onDragOver={e=>{e.preventDefault();}} onDrop={e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f)analyzeFile(f);}}
        onClick={()=>document.getElementById("belf2")&&document.getElementById("belf2").click()}
        style={{border:"2px dashed #C7C7CC",borderRadius:"14px",padding:"28px 20px",textAlign:"center",cursor:"pointer"}}>
        <div style={{fontSize:"32px",marginBottom:"8px"}}>📄</div>
        <div style={{fontSize:"15px",fontWeight:600,color:"#3A3A3C"}}>Rechnung tippen oder ablegen</div>
        <div style={{fontSize:"13px",color:"#8E8E93",marginTop:"4px"}}>JPG / PNG / PDF</div>
        <input id="belf2" type="file" accept="image/*,.pdf" onChange={e=>{const f=e.target.files[0];if(f)analyzeFile(f);}} style={{display:"none"}}/>
      </div>
    )}
    {upLoad&&<div style={{textAlign:"center",padding:"40px 20px"}}>
      <div style={{width:"40px",height:"40px",border:"3px solid #E5E5EA",borderTopColor:"#007AFF",borderRadius:"50%",animation:"spin 1s linear infinite",margin:"0 auto 12px"}}/>
      <div style={{fontSize:"15px",fontWeight:600,color:"#1C1C1E"}}>KI analysiert...</div>
    </div>}
    {upRes&&!upRes.error&&(
      <div>
        <div style={{background:upRes.confidence>=80?"#F0FFF4":"#FFFBF0",borderRadius:"14px",padding:"14px",marginBottom:"12px"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:"10px"}}>
            <div style={{fontSize:"13px",fontWeight:600,color:upRes.confidence>=80?"#34C759":"#FF9500"}}>{upRes.type==="income"?"Ausgangsrechnung":"Eingangsrechnung"} erkannt</div>
            <div style={{fontSize:"12px",color:"#8E8E93"}}>{upRes.confidence}%</div>
          </div>
          {[["Datum",upRes.date||""],["Beschreibung",upRes.description||""],["Aussteller",upRes.vendor||""],["Betrag",upRes.amount?fmt(upRes.amount):""],["Kategorie",upRes.suggestedCategory||""],["Rech.Nr.",upRes.invoiceNumber||"-"]].map(([k,v])=>(
            <div key={k} style={{display:"flex",gap:"12px",padding:"6px 0",borderBottom:"1px solid rgba(0,0,0,.06)",fontSize:"14px"}}>
              <span style={{color:"#8E8E93",minWidth:"90px",flexShrink:0}}>{k}</span>
              <span style={{color:"#1C1C1E",fontWeight:500}}>{v}</span>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:"10px"}}>
          <BtnS onClick={()=>setUpRes(null)} style={{flex:1}}>Neu</BtnS>
          <Btn onClick={applyUpload} style={{flex:2}}>Automatisch eintragen</Btn>
        </div>
      </div>
    )}
    {upRes?.error&&<div style={{background:"#FFF1F0",borderRadius:"14px",padding:"18px",textAlign:"center"}}>
      <div style={{fontSize:"14px",color:"#FF3B30",marginBottom:"10px"}}>{upRes.error}</div>
      <BtnS onClick={()=>setUpRes(null)}>Erneut</BtnS>
    </div>}
  </Modal>
</div>
```

);
}

ReactDOM.createRoot(document.getElementById(‘root’)).render(React.createElement(App));
</script>
